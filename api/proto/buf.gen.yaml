version: v2
managed:
  enabled: true
plugins:
  - local: protoc-gen-go
    out: ../../pkg/api
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../../pkg/api
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true
  - local: protoc-gen-grpc-gateway
    out: ../../pkg/api
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
  - local: protoc-gen-openapiv2
    out: ../openapi
    opt:
      - logtostderr=true
      - allow_merge=true
      - merge_file_name=faas
inputs:
  - directory: .
